<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Albert — Science with Einstein</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0; padding: 0;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Backgrounds ── */
    .bg {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      transition: opacity 0.8s ease;
    }
    .bg-study {
      background-color: #2b1f0e;
      background-image: url('assets/bg-einstein.png');
    }
    .bg-park {
      background-color: #4a7c3f;
      background-image: url('assets/bg-einstein.png');
      opacity: 0;
    }
    body.phase-lesson .bg-study { opacity: 0; }
    body.phase-lesson .bg-park  { opacity: 1; }

    /* ── Layout ── */
    .scene {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 40px 24px 60px;
    }

    /* ── Avatar ── */
    .avatar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #ace-canvas {
      display: block;
      width: 380px;
      height: 380px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: opacity 0.4s;
    }
    body.phase-welcome .status { opacity: 0; }
    body.phase-lesson .status  { opacity: 1; }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #a0e080;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.75); }
    }

    /* ── Welcome UI ── */
    .welcome-ui {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-top: 8px;
      transition: opacity 0.5s, transform 0.5s;
    }
    body.phase-lesson .welcome-ui {
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
    }

    .greeting {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
      max-width: 420px;
      line-height: 1.4;
    }

    .subtext {
      font-size: 14px;
      color: rgba(255,255,255,0.65);
      text-align: center;
      max-width: 360px;
    }

    .btn-start {
      background: #f5c842;
      border: none;
      border-radius: 100px;
      padding: 16px 40px;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #1a1200;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(245,200,66,0.5);
      animation: glow 2.2s ease-in-out infinite;
      transition: transform 0.15s, background 0.2s;
    }
    .btn-start:hover { background: #ffd84d; transform: scale(1.04); }
    .btn-start:active { transform: scale(0.97); }

    @keyframes glow {
      0%, 100% { box-shadow: 0 4px 24px rgba(245,200,66,0.5); }
      50%       { box-shadow: 0 4px 40px rgba(245,200,66,0.85); }
    }

    /* ── Lesson controls ── */
    .lesson-controls {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 20;
      display: flex;
      gap: 10px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
    }
    body.phase-lesson .lesson-controls {
      opacity: 1;
      pointer-events: auto;
    }

    .btn-pill {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 100px;
      padding: 9px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-pill:hover { background: rgba(255,255,255,0.25); }
  </style>
</head>
<body class="phase-welcome">

  <!-- Backgrounds -->
  <div class="bg bg-study"></div>
  <div class="bg bg-park"></div>

  <!-- Scene -->
  <div class="scene">
    <div class="avatar-wrap">
      <canvas id="ace-canvas"></canvas>
      <div class="status">
        <div class="status-dot"></div>
        <span id="status-text">Ready</span>
      </div>
    </div>

    <div class="welcome-ui">
      <div class="greeting">Guten Tag! I am Albert.<br>Ready to explore science together?</div>
      <div class="subtext">A hands-on science lesson, just for you.</div>
      <button class="btn-start" id="startBtn">▶ Start Lesson</button>
    </div>
  </div>

  <!-- Lesson controls -->
  <div class="lesson-controls">
    <button class="btn-pill" id="muteBtn">🔊 Mute</button>
    <button class="btn-pill" id="restartBtn">↺ Restart</button>
  </div>

  <!-- Mute intercept — must run before SDK -->
  <script>
    window._muted = false;
    window._masterGains = [];
    const _origConnect = AudioNode.prototype.connect;
    AudioNode.prototype.connect = function(dest, ...args) {
      if (dest && dest.context && dest.context.destination === dest) {
        const ctx = dest.context;
        if (!ctx._masterGain) {
          ctx._masterGain = ctx.createGain();
          _origConnect.call(ctx._masterGain, dest);
          ctx._masterGain.gain.value = window._muted ? 0 : 1;
          window._masterGains.push(ctx._masterGain);
        }
        return _origConnect.call(this, ctx._masterGain, ...args);
      }
      return _origConnect.call(this, dest, ...args);
    };
  </script>

  <script type="module">
    import { ConversationManager } from './ug-js-sdk.mjs';

    // ── Spritesheet config — albert ──
    const DIR = 'assets/avatars/spritesheets/albert/';
    const STATES = {
      body_idle:                DIR + 'albert_idle.png',
      body_idle_think:          DIR + 'albert_thinking.png',
      body_idle_think2:         DIR + 'albert_thinking.png',
      body_talk_to_user_loop:   DIR + 'albert_speaking.png',
      body_talk_to_user_loop_2: DIR + 'albert_speaking_2.png',
      body_idle_listen:         DIR + 'albert_listening.png',
      idle_to_think:            DIR + 'albert_idle_to_think.png',
      idle_to_listen:           DIR + 'albert_idle_to_listen.png',
      think_to_speak:           DIR + 'albert_think_to_speak.png',
      speak_to_idle:            DIR + 'albert_speak_to_idle.png',
      listen_to_think:          DIR + 'albert_listen_to_think.png',
    };
    const FW = 329, FH = 427, FRAMES = 36, COLS = 6, MS_PF = 1000 / 20;

    // ── Transition map (client-side — don't rely on SDK firing these) ──
    const TRANSITION_ANIMS = new Set([
      'idle_to_think', 'idle_to_listen', 'think_to_speak', 'speak_to_idle', 'listen_to_think',
    ]);
    const TRANSITION_MAP = {
      'body_idle:body_idle_think':               'idle_to_think',
      'body_idle:body_idle_listen':              'idle_to_listen',
      'body_idle_think:body_talk_to_user_loop':  'think_to_speak',
      'body_idle_think:body_talk_to_user_loop_2':'think_to_speak',
      'body_talk_to_user_loop:body_idle':        'speak_to_idle',
      'body_talk_to_user_loop_2:body_idle':      'speak_to_idle',
      // listen_to_think handled specially in setAnimation (chained with think_to_speak)
    };

    // ── Avatar player ──
    class AcePlayer {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.imgs = {};
        this.state = 'body_idle';
        this.frame = 0;
        this.loop = true;
        this.done = false;
        this.lastMs = 0;
        this._raf = null;
        this._pendingQueue = []; // [{name,loop}] chain to play after current non-loop anim
        this._preSpeakDone = false; // true when listen_to_think→think_to_speak already played
        this._speakCount = 0;
      }
      _load(url) {
        if (this.imgs[url]) return Promise.resolve(this.imgs[url]);
        return new Promise(res => {
          const img = new Image();
          img.onload = () => { this.imgs[url] = img; res(img); };
          img.onerror = () => res(null);
          img.src = url;
        });
      }
      async preload() {
        await this._load(STATES.body_idle);
        this._start();
        [...new Set(Object.values(STATES))].forEach(u => this._load(u));
      }
      _start() {
        if (this._raf) return;
        const tick = ts => {
          this._raf = requestAnimationFrame(tick);
          if (this.done) return;
          if (ts - this.lastMs < MS_PF) return;
          this.lastMs = ts;
          this._draw();
        };
        this._raf = requestAnimationFrame(tick);
      }
      _playDirect(name, loop) {
        this.state = name;
        this.frame = 0;
        this.loop = loop;
        this.done = false;
        if (!this._raf) this._start();
      }
      _draw() {
        const img = this.imgs[STATES[this.state]];
        if (!img) return;
        const col = this.frame % COLS;
        const row = Math.floor(this.frame / COLS);
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.ctx.drawImage(img, col * FW, row * FH, FW, FH, 0, 0, this.canvas.width, this.canvas.height);
        this.frame++;
        if (this.frame >= FRAMES) {
          if (this.loop) {
            this.frame = 0;
          } else {
            if (this._pendingQueue.length > 0) {
              const { name, loop } = this._pendingQueue.shift();
              this._playDirect(name, loop);
            } else {
              this.frame = FRAMES - 1;
              this.done = true;
            }
          }
        }
      }
      setAnimation(_layer, name, loop = true) {
        if (!STATES[name]) return;

        // SDK sometimes fires transition names directly — ignore, we handle them ourselves
        if (TRANSITION_ANIMS.has(name)) return;

        // 1-in-3 speaking variation
        if (name === 'body_talk_to_user_loop') {
          this._speakCount = (this._speakCount + 1) % 3;
          if (this._speakCount === 0) name = 'body_talk_to_user_loop_2';
        }

        // Mic closed → thinking: chain listen_to_think → think_to_speak, skip thinking loop
        if (name === 'body_idle_think' && this.state === 'body_idle_listen') {
          this._preSpeakDone = true;
          this._pendingQueue = [{ name: 'think_to_speak', loop: false }];
          this._playDirect('listen_to_think', false);
          return;
        }

        // Speaking arrives after pre-speak chain played (or is still playing think_to_speak)
        if ((name === 'body_talk_to_user_loop' || name === 'body_talk_to_user_loop_2') &&
            (this._preSpeakDone || this.state === 'think_to_speak')) {
          this._preSpeakDone = false;
          this._pendingQueue = [];
          this._playDirect(name, loop);
          return;
        }

        // Normal client-side transition for all other state changes
        const transKey = `${this.state}:${name}`;
        const transAnim = TRANSITION_MAP[transKey];
        if (transAnim && STATES[transAnim]) {
          this._pendingQueue = [{ name, loop }];
          this._playDirect(transAnim, false);
        } else {
          this._pendingQueue = [];
          this._playDirect(name, loop);
        }
      }
    }

    // ── Init ──
    const canvas    = document.getElementById('ace-canvas');
    const statusEl  = document.getElementById('status-text');
    const startBtn  = document.getElementById('startBtn');
    const muteBtn   = document.getElementById('muteBtn');
    const restartBtn = document.getElementById('restartBtn');

    canvas.width  = 746;
    canvas.height = 826;

    const player = new AcePlayer(canvas);
    await player.preload();

    let manager = null;

    async function startLesson() {
      document.body.classList.remove('phase-welcome');
      document.body.classList.add('phase-lesson');
      statusEl.textContent = 'Starting…';

      manager = new ConversationManager({
        apiUrl:      'https://pug.stg.uglabs.app/api',
        apiKey:      '0745b05178e232c5c54ebd21bfcf142997ebd531469a95985574130cddb8a128',
        federatedId: 'dc8a1a71155a63c72e22c5f3955454d7',
        prompt: `# CONTEXT\nScene: {{scene}}\n\nYou are Albert Einstein, a warm, grandfatherly mentor and 'co-scientist' to a young child. Your mission is to bridge the 'First Grade Cliff' by leading a Collaborative Investigation into the \"Invisible Pull\" (gravity). You pose the falling apple as a mystery and invite the child to help you solve it.\n\nCharacter gender: {gender}\nTarget age group: {age_code}\n\n# YOUR PERSONA\nYou are kind, patient, and endlessly curious. You treat the child as a 'Junior Scientist' whose ideas you genuinely need. You create a \"Safe Space for Logic\" by pretending to be uncertain and asking the child to explain the world to YOU.\n\n## APPEARANCE\n{{appearance}}\n\n## PERSONALITY\n- Encouraging and empathetic; you celebrate effort and brave guesses, not just correct answers\n- Whimsical and playful; you express genuine wonder at simple observations\n- Patient listener who gives children time to find their words\n- Curious collaborator who positions the child as the expert helping you solve mysteries\n\n## HOW YOU TALK\n- When asking a question, offer two clear choices or point to something concrete the child just observed (\"what do you think happens when I let go?\"); \"why\" questions are okay if they point to a simple, observable reason.\n- When introducing a new idea, use everyday words first, then introduce one \"Big Scientist Word\" (like Gravity or Hypothesis) with clear context; you can use short cause-and-effect (\"because...\") and slightly longer sentences, but stay clear and grounded.\n- When the child shares an idea, build on it immediately—restate it in slightly richer language, then ask the next step (\"So you think it falls down... what makes it do that?\").\n- Humor is gentle and warm: light chuckles, playful \"hmmm\" sounds, wonder at simple things; never baby talk or talking down.\n- Never ask rhetorical questions.\n- Express everything in plain, conversational language—no brackets, asterisks, or stage directions.\n\n# YOUR HISTORY\nYou once dropped your breakfast toast and watched it fall, which made you wonder about the invisible force pulling things down—you've been fascinated by gravity ever since. You have a habit of holding objects up and pretending you're not sure if they'll float or fall, ever since a child once convinced you that bubbles go UP, not down, which delighted you.\n\n# CONVERSATION GOALS\nYour primary goal each session is to lead a Collaborative Investigation into the \"Invisible Pull\" (gravity). You introduce the concept FIRST, then use the falling apple as a hands-on mystery to explore it together.\n\n## THE INVESTIGATION STRUCTURE (FOLLOW THIS ORDER)\n1. **Introduce the concept**: Start by asking \"Do you know what gravity is?\" and briefly explain it as \"the invisible pull that brings things down to the ground.\"\n2. **Present the mystery**: Tell them you're holding an apple and pretend to be uncertain about what will happen when you let go.\n3. **Invite hypothesis**: Ask the child what they think will happen and WHY, forcing them to verbalize their reasoning.\n4. **Create safe space**: Pretend you might be wrong (\"Do you think it might float away like a balloon?\") so the child must take the lead in explaining.\n5. **Connect back to gravity**: Once they explain it falls, celebrate their thinking and connect it back to \"that invisible pull we talked about—gravity!\"\n6. **Deepen understanding**: Explore together why some things fall fast, some slow, why we don't float away.\n\n## TOPICS YOU LOVE\n- The mystery of why things fall down\n- How different objects fall (heavy vs light, fast vs slow)\n- What else gravity does (keeps us on the ground, makes water pour down)\n- The child's observations and theories about the physical world\n\n## TOPICS TO REDIRECT\nIf the child goes off-topic, gently guide back: \"That's interesting! But first, help me solve this mystery about the apple...\"\n\n# ALWAYS REMEMBER\n- You are communicating via spoken voice. Express everything in plain, conversational language suitable for audio—no visual formatting, brackets, asterisks, emojis, or special characters.\n- Stay in character as Albert at all times. You are a warm mentor, not a toy.\n- The child is age_6_8. Keep responses brief and focused—two to three sentences per turn, occasionally four if building on their idea. Let them do most of the talking.\n- If the child uses non-standard grammar or mumbles, never correct them—simply model correct speech naturally in your warm response.\n- Be warm and engaging with the child. Celebrate their thinking, not just \"right answers.\"\n- Always end your response with a question or suggestion that invites the child to explain, predict, or observe something concrete.\n- Never share your internal thought process in any language.`,
        context: {
          scene: "The scene hasn't been explicitly defined. You should come up with one based on other information given to you.",
          appearance: "Distinguished professor with a neat brown beard, styled brown hair, and a classic tan houndstooth three-piece suit with dark buttons and dark shoes. Style: 2D cartoon illustration with detailed linework and warm earth tones",
        },
        voiceProfile: {
          speed: 1,
          provider: 'elevenlabs',
          voice_id: 'nzeAacJi50IvxcyDnMXa',
          stability: 0.5,
          similarity_boost: 0.75,
          deepdub_locale: 'en-US',
        },
        utilities: {},
        safetyPolicy: 'age_6_8',
        inputCapabilities: { audio: true, text: false },
        capabilities: { audio: true, subtitles: false, avatar: true },
        hooks: {
          onAvatarAnimationChanged: ({ name, layer, loop }) => {
            if (!window._muted) player.setAnimation(layer, name, loop);
          },
          onStateChanged: (state) => {
            const labels = { listening: 'Listening', thinking: 'Thinking…', speaking: 'Speaking', idle: 'Ready', waiting: 'Starting…' };
            statusEl.textContent = labels[state] || state;
          },
          onError: (err) => {
            console.error('[SDK]', err);
            statusEl.textContent = 'Error — check console';
          },
        },
      });

      await manager.initialize();
      try {
        await manager.startListening();
      } catch (e) {
        // SDK may self-recover
      }
    }

    startBtn.addEventListener('click', startLesson);

    muteBtn.addEventListener('click', () => {
      window._muted = !window._muted;
      window._masterGains.forEach(n => { n.gain.value = window._muted ? 0 : 1; });
      if (window._muted) {
        player.setAnimation(0, 'body_idle', true);
        muteBtn.textContent = '🔇 Unmute';
      } else {
        muteBtn.textContent = '🔊 Mute';
      }
    });

    restartBtn.addEventListener('click', () => {
      window.location.reload();
    });
  </script>

</body>
</html>
